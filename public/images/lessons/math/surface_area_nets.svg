<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <rect width="720" height="380" fill="#F7F3E9"/>
  <text x="36" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1F3A5F">Prism Net and Surface Area</text>
  <text x="36" y="72" font-family="Arial, sans-serif" font-size="18" fill="#476C8A">Unfold the solid, match every face, then add the outside areas.</text>

  <g transform="translate(32 108)">
    <rect x="0" y="60" width="120" height="70" rx="8" fill="#DCEAF7" stroke="#335C81" stroke-width="3"/>
    <rect x="120" y="60" width="120" height="70" rx="8" fill="#EAF3FB" stroke="#335C81" stroke-width="3"/>
    <rect x="240" y="60" width="120" height="70" rx="8" fill="#DCEAF7" stroke="#335C81" stroke-width="3"/>
    <rect x="360" y="60" width="120" height="70" rx="8" fill="#EAF3FB" stroke="#335C81" stroke-width="3"/>
    <rect x="120" y="0" width="120" height="60" rx="8" fill="#FFF0CC" stroke="#C26D42" stroke-width="3"/>
    <rect x="120" y="130" width="120" height="60" rx="8" fill="#FFF0CC" stroke="#C26D42" stroke-width="3"/>

    <text x="186" y="-18" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#C26D42">top</text>
    <text x="173" y="225" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#C26D42">bottom</text>
    <text x="36" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#335C81">side</text>
    <text x="150" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#335C81">front</text>
    <text x="274" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#335C81">side</text>
    <text x="392" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#335C81">back</text>

    <text x="44" y="96" font-family="Arial, sans-serif" font-size="16" fill="#335C81">4 x 3</text>
    <text x="164" y="96" font-family="Arial, sans-serif" font-size="16" fill="#335C81">6 x 3</text>
    <text x="284" y="96" font-family="Arial, sans-serif" font-size="16" fill="#335C81">4 x 3</text>
    <text x="404" y="96" font-family="Arial, sans-serif" font-size="16" fill="#335C81">6 x 3</text>
    <text x="164" y="36" font-family="Arial, sans-serif" font-size="16" fill="#7B4B2A">6 x 4</text>
    <text x="164" y="166" font-family="Arial, sans-serif" font-size="16" fill="#7B4B2A">6 x 4</text>
  </g>

  <g transform="translate(550 112)">
    <polygon points="0,36 90,36 130,62 40,62" fill="#DCEAF7" stroke="#335C81" stroke-width="3"/>
    <polygon points="0,36 40,62 40,156 0,130" fill="#C7DBEF" stroke="#335C81" stroke-width="3"/>
    <polygon points="40,62 130,62 130,156 40,156" fill="#EAF3FB" stroke="#335C81" stroke-width="3"/>

    <line x1="0" y1="168" x2="40" y2="168" stroke="#C26D42" stroke-width="4"/>
    <line x1="138" y1="62" x2="138" y2="156" stroke="#C26D42" stroke-width="4"/>
    <line x1="90" y1="24" x2="130" y2="50" stroke="#C26D42" stroke-width="4"/>

    <text x="2" y="194" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#C26D42">width</text>
    <text x="148" y="114" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#C26D42">height</text>
    <text x="92" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#C26D42">length</text>
    <text x="42" y="226" font-family="Arial, sans-serif" font-size="18" fill="#1F3A5F">Fold to make the prism.</text>
  </g>
