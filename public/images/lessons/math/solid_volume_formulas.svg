<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <rect width="760" height="380" fill="#F7F3E9"/>
  <text x="36" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1F3A5F">Volume Formulas for Curved Solids</text>
  <text x="36" y="72" font-family="Arial, sans-serif" font-size="18" fill="#476C8A">Compare which measurements each solid needs before substituting values.</text>

  <g transform="translate(54 118)">
    <ellipse cx="84" cy="110" rx="48" ry="14" fill="#FBD38D" stroke="#C26D42" stroke-width="3"/>
    <rect x="36" y="34" width="96" height="76" fill="#FCE7B2" stroke="#C26D42" stroke-width="3"/>
    <ellipse cx="84" cy="34" rx="48" ry="14" fill="#FCE7B2" stroke="#C26D42" stroke-width="3"/>
    <line x1="84" y1="34" x2="84" y2="110" stroke="#335C81" stroke-width="3" stroke-dasharray="6 4"/>
    <line x1="84" y1="34" x2="132" y2="34" stroke="#335C81" stroke-width="3"/>
    <text x="84" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1F3A5F">Cylinder</text>
    <text x="84" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#C26D42">V = pi r^2 h</text>
    <text x="144" y="76" font-family="Arial, sans-serif" font-size="16" fill="#335C81">h</text>
    <text x="108" y="24" font-family="Arial, sans-serif" font-size="16" fill="#335C81">r</text>
  </g>

  <g transform="translate(300 116)">
    <ellipse cx="80" cy="114" rx="48" ry="14" fill="#DCEAF7" stroke="#335C81" stroke-width="3"/>
    <polygon points="80,20 32,114 128,114" fill="#EAF3FB" stroke="#335C81" stroke-width="3"/>
    <line x1="80" y1="20" x2="80" y2="114" stroke="#C26D42" stroke-width="3" stroke-dasharray="6 4"/>
    <line x1="80" y1="114" x2="128" y2="114" stroke="#C26D42" stroke-width="3"/>
    <text x="80" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1F3A5F">Cone</text>
    <text x="80" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#335C81">V = (1/3) pi r^2 h</text>
    <text x="92" y="72" font-family="Arial, sans-serif" font-size="16" fill="#C26D42">h</text>
    <text x="106" y="106" font-family="Arial, sans-serif" font-size="16" fill="#C26D42">r</text>
  </g>

  <g transform="translate(560 120)">
    <circle cx="68" cy="68" r="60" fill="#D8F0DF" stroke="#3F7A5C" stroke-width="3"/>
    <circle cx="68" cy="68" r="6" fill="#3F7A5C"/>
    <line x1="68" y1="68" x2="128" y2="68" stroke="#3F7A5C" stroke-width="3"/>
    <text x="68" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1F3A5F">Sphere</text>
    <text x="68" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#3F7A5C">V = (4/3) pi r^3</text>
    <text x="98" y="58" font-family="Arial, sans-serif" font-size="16" fill="#3F7A5C">r</text>
  </g>

  <g transform="translate(40 312)">
    <rect x="0" y="0" width="680" height="44" rx="12" fill="#FFFFFF" stroke="#D4C29A" stroke-width="2"/>
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="18" fill="#1F3A5F">Use the solid to choose the formula first. Then check whether the answer should use cubic units.</text>
  </g>
</svg>
